<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-auth">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-lg p-4 auth-card">
      <div class="text-center mb-4">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User Icon" class="mb-2" style="width: 60px;">
        <h2>Forgot Password</h2>
        <p class="text-muted">Enter your email to receive a password reset link.</p>
      </div>
      <form id="forgot-form" class="auth-form" novalidate>
        <div class="mb-3">
          <label for="forgot-email" class="form-label">Email address</label>
          <input type="email" class="form-control" id="forgot-email" required autocomplete="username">
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>
        <button type="submit" class="btn btn-warning w-100 mb-2">Send Reset Link</button>
        <div class="text-center mt-3">
          <span>Remembered your password? <a href="auth.html">Login</a></span>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="forgot.js"></script>
</body>
</html>
