<!-- This file will be the Login page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-auth">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-lg p-4 auth-card">
      <div class="text-center mb-4">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User Icon" class="mb-2" style="width: 60px;">
        <h2>Sign In</h2>
        <p class="text-muted">Welcome back! Please login to your account.</p>
      </div>
      <form id="login-form" class="auth-form" novalidate>
        <div class="mb-3">
          <label for="login-email" class="form-label">Email address</label>
          <input type="email" class="form-control" id="login-email" required autocomplete="username">
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>
        <div class="mb-3 position-relative">
          <label for="login-password" class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="login-password" required autocomplete="current-password">
            <button class="btn btn-outline-secondary" type="button" id="toggleLoginPassword" tabindex="-1">
              <span id="toggleLoginPasswordIcon" class="bi bi-eye"></span>
            </button>
            <div class="invalid-feedback">Password is required.</div>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <input type="checkbox" id="remember-me" class="form-check-input">
            <label for="remember-me" class="form-check-label small">Remember me</label>
          </div>
          <a href="forgot.html">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-2">Login</button>
        <div class="text-center my-2">or</div>
        <button type="button" class="btn btn-danger w-100 mb-2" id="google-login">
          <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="width:20px; margin-right:8px;"> Sign in with Google
        </button>
        <div class="text-center mt-3">
          <span>Don't have an account? <a href="register.html">Register</a></span>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
