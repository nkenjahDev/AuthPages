<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-auth">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-lg p-4 auth-card">
      <div class="text-center mb-4">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User Icon" class="mb-2" style="width: 60px;">
        <h2>Reset Password</h2>
        <p class="text-muted">Set a new password for your account.</p>
      </div>
      <form id="reset-form" class="auth-form" novalidate>
        <div class="mb-3 position-relative">
          <label for="reset-password" class="form-label">New Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="reset-password" required autocomplete="new-password">
            <button class="btn btn-outline-secondary" type="button" id="toggleResetPassword" tabindex="-1">
              <span id="toggleResetPasswordIcon" class="bi bi-eye"></span>
            </button>
            <div class="invalid-feedback">Password must be at least 6 characters.</div>
          </div>
        </div>
        <div class="mb-3 position-relative">
          <label for="reset-confirm-password" class="form-label">Confirm New Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="reset-confirm-password" required autocomplete="new-password">
            <button class="btn btn-outline-secondary" type="button" id="toggleResetConfirmPassword" tabindex="-1">
              <span id="toggleResetConfirmPasswordIcon" class="bi bi-eye"></span>
            </button>
            <div class="invalid-feedback">Passwords do not match.</div>
          </div>
        </div>
        <button type="submit" class="btn btn-info w-100 mb-2">Reset Password</button>
        <div class="text-center mt-3">
          <span>Back to <a href="auth.html">Login</a></span>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="reset.js"></script>
</body>
</html>
